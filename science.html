// BUILD UI
// ═══════════════════════════════════════════════════════════════════════════════

const container = document.getElementById('science');

TECH.forEach(cat => {
  const section = document.createElement('div');
  section.className = 'tech-category';
  section.innerHTML = `<div class="tech-category-header">${cat.category}</div>`;

  cat.entries.forEach(entry => {
    const el = document.createElement('div');
    el.className = 'tech-entry';
    el.innerHTML = `
      <div class="tech-entry-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="tech-name">${entry.name}</span>
        <span class="tech-badge">${entry.badge}</span>
        <span class="expand-icon">▸</span>
      </div>
      <div class="tech-entry-body">
        <div class="tech-section">
          <div class="tech-section-label">In-Universe</div>
          <div class="tech-section-text">${entry.universe.split('\n\n').map(p => '<p style="margin-bottom:8px">' + p + '</p>').join('')}</div>
        </div>
        <div class="tech-section">
          <div class="tech-section-label">Real Science</div>
          <div class="tech-section-text">${entry.science.split('\n\n').map(p => '<p style="margin-bottom:8px">' + p + '</p>').join('')}</div>
        </div>
        <div class="tech-ref">${entry.ref}</div>
      </div>
    `;
    section.appendChild(el);
  });

  container.appendChild(section);
});

// Expand first entry by default
document.querySelector('.tech-entry')?.classList.add('open');
</script>
</body>
</html>
