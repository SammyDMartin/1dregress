    universe: `The Utilitaria's dormant weapon system and ultimate contingency plan. Before its destruction in 2314, the Utilitaria planted tens of thousands of geothermal-powered hubs across Earth's ocean floors. Each hub is a self-contained weapons platform: a tubular core embedded in the abyss, surrounded by coral-like structures, extending tendrils upward like an anemone. Each hub spools hyperdiamond optical fibres to the ocean surface, and each fibre delivers 100 kW of coherent blue light. The warseeds lay dormant for 165 years, powered by geothermal energy, waiting for activation.

    universe: `Conversion bombs are the primary strategic weapon of the Apathy War, carried by D-spheres and deployed via frameshift shunts. They release more energy than Einstein deemed possible — liberating the potential energy of the quantum vacuum itself rather than merely converting rest mass to energy. In combat against the Apathy, hundred-teraton conversion bombs are frameshifted to point-blank range, their "unfocused blast of liberated vacuum energy" scouring away sections of Apathy machinery while micro-singularities disrupt internal mechanics. The yield follows a power-law distribution — occasionally far higher than expected. When the narrator of "Bows and Arrows Against the Lightning" detonates a modified vacuum reactor in conversion mode, the yield is high enough to "destroy every planet in Earth's solar system," severing planetary masses of Apathy material.

    science: `The concept exploits a deep question in quantum field theory: is our vacuum the lowest possible energy state? If it is a "false vacuum" — a metastable state above the true ground state — then triggering a transition to the true vacuum would release the difference in vacuum energy density. This energy is not stored in mass (E=mc²) but in the fabric of spacetime itself, which is why the yield exceeds what Einstein's mass-energy equivalence would predict from the bomb's physical mass alone.

The energy density of the quantum vacuum is one of the great unsolved problems in physics. Quantum field theory naively predicts a vacuum energy density of ~10⁹³ g/cm³ (the "cosmological constant problem"), while observation suggests it is 120 orders of magnitude smaller. If even a tiny fraction of this discrepancy represents real, extractable energy in a false vacuum transition, the energy released from converting a small volume of space would dwarf any nuclear or antimatter reaction.

          <div class="tech-section-label">Real Science</div>
          <div class="tech-section-text">${entry.science.split('\n\n').map(p => '<p style="margin-bottom:8px">' + p + '</p>').join('')}</div>
