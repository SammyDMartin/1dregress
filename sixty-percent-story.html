{
  title: "THE APPROACH",
  header: "SCENE 01 — ARRIVAL",
  bg: "scene-bg-rain",
  effect: "effect-rain",
  text: `<p>The rain hadn&rsquo;t stopped in three days. It came down grey and warm, the kind of rain that carried trace metals from the orbital foundries and left a faint mineral tang on your skin. I walked through it without an umbrella, hood down, because an umbrella would have drawn attention and attention was the last thing I needed.</p>

<p>The Centre sat in the midst of a fashionable part of the city, an incongruous structure shaped like an elongated saucer, surrounded on all sides by the grey, functional towers built to house the masses of displaced union citizens. I pushed my way through the crowd, doing my best to blend in, inlaid face and skull concealed beneath a wig, face held behind a flesh-mask. The Centre looked out of place, as if it had been lowered into this place from another time, a better world. That was, of course, the truth.</p>

<p>The towers had gone up fast after the last evacuation wave, prefabricated neummanetic structures designed for temporary habitation that had become permanent the way temporary things always do. Forty billion people crammed into a system that had been built for twelve. The displaced from Aurelia, from Caspian Reach, from every system the Apathy had swallowed in the last decade. They lived stacked in those grey columns, resenting us, needing us, hating the necessity of both.</p>

<p>I kept my head low as I crossed the plaza. The flesh-mask itched where it met the edge of my cranial inlays, the slight mismatch between synthetic skin and the hard substrate beneath pulling at the adhesion points. The wig was worse. It sat heavy and hot over the dense lattice of processing nodes that covered my skull, nodes that right now were running dark, broadcasting nothing, receiving nothing. <span class="thought">In this crowd I was just another face, just another body shuffling through the rain towards a building most of them would never be allowed to enter.</span></p>

<p>A crowd of protesters, most wearing the white sashes of Multiplicity supporters, was hemmed in on all sides by nervejam barriers, the two human-seeming guards at the front entrance holding the line. A moment later I was through the barrier, feeling the pulse of warmth as the plasma curtain parted around me, muffling the sounds of the crowd outside. <span class="emphasis">And I was home &mdash; back among the Utilitaria, back to a world that made sense.</span></p>

<p>The chanting faded behind me. Something about sovereignty and the right of all minds. The Multiplicity had been gaining ground for years, feeding on the resentment that came with being a refugee in someone else&rsquo;s system. They wanted distributed governance, wanted to strip the Conclave of its coordination powers, wanted every mind to have an equal vote regardless of enhancement or integration level. It was a fine idea for peacetime. <span class="thought">In a war against something like the Apathy, it was suicide.</span></p>`

{
  title: "THE WARNING",
  header: "SCENE 02 — SOLITONIC RADIATION",
  bg: "scene-bg-warning",
  effect: "effect-amber",
  text: `<p>I made my way inside, expanded mentality already establishing connections with the interior. I knew immediately that something was very wrong, and soon emerged into the central meetingspace. There were a half-dozen senior conclave members in attendance, and our entire cohort of Involved officers, including myself. The meeting was already in progress.</p>

<p>The meetingspace was a broad amphitheatre, its curved walls alive with data feeds and tactical projections, the air thick with the invisible hum of processing power. The Conclave members sat in a loose semicircle, their bodies still and composed, their eyes carrying the distant look of minds running at speeds no unaugmented human could follow. I recognised the mandator immediately &mdash; a tall, severe figure whose physical form bore the hallmarks of someone who spent most of their time integrated, the faint asymmetry of features that had been neglected in favour of deeper architectures. Beside him, a woman I didn&rsquo;t know, her eyes flickering with the telltale shimmer of an active data-trawl. The rest were familiar faces from a dozen previous briefings, a dozen previous crises.</p>

<p>The Involved officers stood apart, as we always did. We were the Utilitaria&rsquo;s hands in the physical world, enhanced enough to interface directly with military systems but not so deeply integrated that we&rsquo;d lost the rough edges that made us useful in the field. <span class="emphasis">The Conclave needed people who could still think like soldiers, who could make the ugly decisions that pure optimisation sometimes flinched from.</span> That was us. Seven of us, counting myself.</p>

<p>&ldquo;&hellip;our D-sphere detected solitonic gravitational radiation bursts shooting through the inner system&hellip;&rdquo;</p>

<p><span class="thought">I subtitled &mdash; self reinforcing wave packet, in context, gravitational radiation does not form solitons except via artificial generation, frameshift drive modulation.</span></p>

<p>The speaker was Operative Chellam, one of the system&rsquo;s senior analysts, her voice carrying the flat, measured cadence of someone feeding raw data through a translation layer. The tactical display behind her showed the inner system in schematic, the habitable worlds and orbital structures picked out in blue, the worldring&rsquo;s bracelet of habitat cylinders a string of bright dots circling the star. And threading through it all, thin red lines &mdash; the tracks of the solitonic bursts, each one a needle of warped spacetime punching through the system like a bullet through glass.</p>

<p>&ldquo;&hellip;they&rsquo;re shooting through the system like particles in a cloud chamber. Based on previous experience, it&rsquo;s an early warning sign. They&rsquo;ve found us&hellip;&rdquo;</p>

<p>A silence settled over the room, dense and absolute. The kind of silence that meant everyone present was running scenarios at accelerated speed, burning through possibilities in the few seconds of quiet. I watched the red lines multiply on the display and felt something cold settle in my chest. <span class="thought">I had seen this pattern before. Aurelia. Caspian Reach.</span> The solitonic bursts were a side effect of the Apathy&rsquo;s carrier ships dropping in and out of their spatial discontinuity drives, probing the system, mapping its mass distribution, its energy signatures, its defences. Testing the ground before the assault.</p>

<p>&ldquo;How long?&rdquo;</p>

<p>&ldquo;Hard to say. A day at most.&rdquo;</p>

<p>I took in the surrounding room. If they were scared, they hid it well &mdash; but that was the way of the Conclave. Optimisation would be narrowing their mind, focussing them on the task at the expense of everything else. But that wasn&rsquo;t something I had access to.</p>

<p><span class="thought">There it was &mdash; the old gulf. The Conclave could tune their fear down to a manageable whisper, could redirect their cognitive resources away from panic and towards problem-solving with surgical precision. I didn&rsquo;t have that luxury.</span> My enhancements were military-grade, designed for speed and interface compatibility, not for the deep self-modification that the Conclave enjoyed. I felt every thread of the dread currently coiling through my nervous system, and I used it. <span class="emphasis">Fear kept you sharp. Fear kept you honest about the odds.</span></p>

<p>&ldquo;Then how many can we save?&rdquo; I asked.</p>

<p>The room turned to me. I was the most junior Involved officer present, but the question had to be asked, and no one else seemed willing to breach the silence.</p>

<p>&ldquo;Upper limit is about sixty percent assuming total mobilisation and full use of intrusion units.&rdquo;</p>

<p><span class="emphasis">Sixty percent.</span> I let the number sit in my mind, let it acquire weight. In this system, sixty percent meant roughly twenty-four billion people. The other sixteen billion would be left behind. Sixteen billion lives, each one a universe of experience and memory, reduced to raw energy by machines that couldn&rsquo;t be reasoned with and barely noticed us as they killed us.</p>

<p>Someone gave a morbid laugh. The mandator interrupted,</p>

<p>&ldquo;They loathe us out there. Anyone with sense escaped a year ago.&rdquo;</p>

<p>He was looking at the feed from the exterior cameras, at the crowd of Multiplicity protesters still pressed against the nervejam barriers. He was right, in a way. The first evacuation warnings had gone out eighteen months ago, when the Apathy&rsquo;s advance had shifted vector and this system had moved from &lsquo;at risk&rsquo; to &lsquo;probable target&rsquo;. Those who could leave had left &mdash; the wealthy, the well-connected, anyone who could secure passage on an outbound dataship or buy their way into an intrusion unit for mind-state transfer through the interstice. The ones left behind were those without the resources or the contacts, and the ones too stubborn or too angry to accept help from the Utilitaria.</p>`

  bg: "scene-bg-emergence",
  effect: "effect-alarm",
  text: `<p>He never completed his thought. <span class="emphasis">A screaming alert intruded itself into our minds.</span></p>

<p style="text-align:center; font-style:italic; color:var(--accent); margin:1.5em 0;">Apathy detected. Emergence range 2AU, arrival time estimated 1200 seconds.</p>

<p>The meetingspace erupted. Not into chaos &mdash; we were too well trained for that &mdash; but into a controlled detonation of activity, every mind in the room simultaneously shifting to emergency protocols. The tactical display bloomed with new data: mass readings, spectral signatures, vector calculations flooding in from the system&rsquo;s sensor nets.</p>

<p>&ldquo;Eternity! Scopes didn&rsquo;t even detect the carrier ships!&rdquo; Someone shouted.</p>

<p>&ldquo;Wormhole already expanding. They&rsquo;re coming through like bloody locusts.&rdquo;</p>

<p>&ldquo;Ground defences to active, signal the D sphere and order it to full attack readiness.&rdquo;</p>

<p>&ldquo;No &mdash; we have to get out ourselves,&rdquo; I said, cutting through the rising voices. &ldquo;Forget the defence plan. There is no defence plan. Not against a full emergence at two AU. The D-sphere buys us time, nothing more.&rdquo;</p>

<p>The mandator turned on me, his expression hard, and for a moment I thought he would pull rank. But the data was right there, burning in all our minds. Two AU. Twenty minutes. A full Apathy emergence, not a lone fleck or a scouting fragment but the real thing, carrier vessels disgorging their payload like seeds scattered on fertile ground. The D-sphere was powerful &mdash; city-sized, armoured in monopole-enriched hyperdiamond, carrying enough conversion bombs to crack a planet. <span class="thought">Against a full emergence, it would last perhaps an hour before the Apathy overwhelmed it.</span></p>

<p>&ldquo;The D-sphere engages to buy time,&rdquo; I continued, trying to keep my voice steady. &ldquo;Every second it holds them is another thousand people through the intrusion units. Signal the worldring &mdash; full evacuation, priority to the habitat cylinders closest to the interstice. Get the dataships moving. All available A-spheres form a screen. Everyone else &mdash;&rdquo; I paused. &ldquo;Everyone else gets to the transit capsules and prays.&rdquo;</p>

<p>&ldquo;We don&rsquo;t have the intrusion capacity for sixty percent,&rdquo; said the analyst, her voice brittle. &ldquo;That was the upper limit assuming a day of preparation. With twenty minutes, we&rsquo;re looking at fifteen percent. Maybe twenty if the data compression holds.&rdquo;</p>

<p><span class="emphasis">Fifteen percent. Six billion out of forty.</span> I felt the number like a blow to the sternum.</p>

<p>&ldquo;Then we prioritise.&rdquo; The words tasted like ash. &ldquo;Children first. Unstreamed mind-states second &mdash; anyone without a recent backup. Physical evacuation for whoever can reach the transit capsules in time.&rdquo;</p>

<p>&ldquo;And the rest?&rdquo;</p>

<p>&ldquo;The rest stay. We all stay, if it comes to that.&rdquo;</p>

<p>The mandator studied me for a long moment, then nodded once. It wasn&rsquo;t agreement, exactly. It was acknowledgement that there was nothing else to say. He turned to the Conclave members and began issuing orders, his voice carrying the precise, toneless quality of someone speaking simultaneously through a dozen communication channels.</p>

<p>I pulled myself out of the meetingspace and let my expanded mentality unfold into the Centre&rsquo;s systems. The building came alive around me &mdash; not metaphorically but in the actual sense that every sensor, every communication node, every fabrication unit became an extension of my own nervous system. I could feel the nervejam barriers humming at the entrances, the intrusion units spinning up in the basement levels, the rooftop communication arrays already screaming evacuation codes to the worldring.</p>

<p>Outside, the protesters had stopped chanting. The alert had reached the public channels. I watched through the exterior sensors as the white sashes went still, as forty billion people across the system simultaneously received the worst news imaginable. <span class="emphasis">For a moment there was a terrible quiet, and then the panic began.</span></p>`
},
{
  title: "THE ARITHMETIC",
  header: "SCENE 04 — COUNTING THE SAVED",
  bg: "scene-bg-arithmetic",
  effect: "effect-cold",
  text: `<p>The transit capsule stations filled in seconds. Crowds surged towards the launch loops, towards the spacescrapers, towards anything that might carry them to the interstice and safety beyond. In the housing towers, families grabbed what they could carry and ran. In the orbital habitats, the same scene repeated a billion times over, compressed into the narrow corridors and cramped transit systems of structures never designed for rapid evacuation.</p>

<p>I closed my eyes and let the data wash over me. Fifteen percent. Maybe twenty. The intrusion units were running at maximum capacity, each one peeling a mind-state from a physical brain in three-point-two seconds and compressing it for transmission. The dataships were filling up, vast vessels whose only cargo was information, each one carrying millions of minds encoded in dense crystalline matrices. <span class="thought">But there weren&rsquo;t enough ships and there wasn&rsquo;t enough time and the mathematics of it were brutally simple.</span></p>

<p>I split my attention. One thread managed the evacuation flow from the Centre and its surrounding blocks, routing people to the nearest functional transit points, flagging bottlenecks, redirecting overflow. Another monitored the military channels as the system&rsquo;s single D-sphere powered up its drives and began its ponderous acceleration towards the emergence point, railguns already cycling through their warm-up sequences. A third thread &mdash; <span class="thought">the one that still felt most like me</span> &mdash; watched the Apathy come.</p>

<p>They materialised in waves, each one a fresh horror. The carrier vessels were barely visible, just faint gravitational distortions that the sensors picked up as warped starlight and anomalous tidal forces. But their cargo was unmistakable. Dense knots of Apathy machinery, each one massing thousands of tons, black and impossible and moving with the fluid purposefulness of living things. <span class="emphasis">They spread out across the system like ink dropped in water, orienting on the largest concentrations of mass and energy.</span></p>

<p>The first wave reached the outer orbital installations eight minutes after emergence. I watched through relay satellites as a fabricator array &mdash; two hundred kilometres of skeletal infrastructure, home to twelve thousand workers and their families &mdash; was consumed. There was no explosion, no dramatic confrontation. The Apathy machinery simply engulfed it, breaking it down with an efficiency that was almost beautiful in its totality. The mass was absorbed, the energy captured, and where the fabricator had been there was only a slightly larger knot of black machinery, already dividing, already reaching for the next target.</p>

<p>The D-sphere fired its first salvo at nine minutes. Conversion bombs, the most powerful weapons humanity had ever built, frameshifted to point-blank range and detonated with yields that made supernovae look modest. I felt the distant shockwaves through the sensor net, watched the blooming flowers of liberated vacuum energy tear chunks from the advancing Apathy. <span class="emphasis">It wasn&rsquo;t enough. It was never enough.</span> The machinery repaired itself, or simply grew around the wounds, consuming the very energy we threw at it and turning it to its own purposes.</p>

<p>But it bought time. Every second the D-sphere held, every moment the Apathy paused to deal with slasher torpedoes and singularity weapons, was another thousand minds through the intrusion units. <span class="thought">I held onto that thought like a lifeline, counting the saved in thousands while the doomed accumulated in billions.</span></p>

<p>At twelve minutes, the evacuation rate peaked. The intrusion units were running hot, their cooling systems pushed to the edge of failure, each one a narrow bridge between flesh and data through which a human mind could squeeze if the compression algorithms held. The dataships were filling in real-time, their crystalline matrices blooming with encoded consciousness. In the transit capsule stations, the physical evacuees were being packed into vessels with a speed and density that would have been comical in any other circumstance &mdash; hundreds of bodies crammed into capsules designed for dozens, acceleration couches shared, restraint systems improvised from whatever was at hand.</p>

<p>Outside the Centre, the crowd had transformed. The Multiplicity sashes were gone, trampled underfoot. The nervejam barriers had been deactivated and the guards had opened the doors, letting people stream into the building and down to the intrusion units in the basement. The protest was over. The political arguments, the factional disputes, the resentment and anger and suspicion &mdash; all of it evaporated in the face of what was coming. <span class="emphasis">There was only the queue, the intrusion unit, the three-point-two seconds between existence as flesh and existence as data, and the hope that on the other side of the interstice there was somewhere left to run.</span></p>`

{
  title: "THE END",

  bg: "scene-bg-consumed",
  effect: "effect-deep",
  text: `<p>At fourteen minutes, the first Apathy elements entered the inner system. I could feel them through the sensor net, <span class="emphasis">a spreading numbness at the edge of perception, like watching a limb go dead.</span> Orbital habitats went dark one by one as the machinery reached them, consumed them, moved on. The worldring was being dismantled from the outside in, its bracelet of bright dots winking out like candles in a wind.</p>

<p>I pulled my awareness back to the Centre. The intrusion units were still running. The queue still stretched up through the building and out into the plaza. I could see their faces through the sensors, wet with rain, tight with fear, and I made the calculations I had been avoiding.</p>

<p><span class="emphasis">At current rates, we would save eighteen percent. Seven point two billion, give or take. The other thirty-three billion would die in the next six minutes.</span></p>

<p>The D-sphere was still fighting. I could feel its death throes through the military channels, the ship&rsquo;s vast intelligence screaming data as it fired its last conversion bombs and charged singularities into the heart of the Apathy swarm. Its crew &mdash; those who hadn&rsquo;t been evacuated &mdash; would die knowing they had bought an extra ninety seconds of evacuation time. Ninety seconds. Three hundred and sixty thousand additional minds, compressed and transmitted through the interstice to safety. <span class="thought">It was everything and nothing.</span></p>

<p>At seventeen minutes, the Apathy reached the planet.</p>

<p>I felt it through the Centre&rsquo;s ground sensors first &mdash; a faint vibration, almost subliminal, as the machinery began its work on the far side of the world. Then the atmospheric readings started to shift, the chemical composition of the air changing as gigatons of matter were broken down and absorbed. The rain stopped. It just stopped, mid-fall, as the water vapour in the upper atmosphere was consumed. For a few seconds the sky was clear for the first time in days, and through the sensors I saw the stars, and beyond them the dark shapes moving against the light.</p>

<p>I shut down my connection to the military channels. The D-sphere was gone. The A-spheres were gone. There was nothing left to fight with, and I had other duties.</p>

<p>The last intrusion unit overheated and shut down at eighteen minutes and forty seconds. I had been counting. <span class="emphasis">Seven point eight billion minds saved, compressed, transmitted. Nineteen point five percent.</span> Better than the analyst&rsquo;s estimate, slightly worse than my own.</p>

<p>In the meetingspace, the remaining Conclave members sat in silence, their enhanced minds running through some final protocol I wasn&rsquo;t privy to. The mandator caught my eye through the sensor feed and held it for a long moment. Then his connection dropped, and I knew he had integrated himself fully into the Centre&rsquo;s systems for the last time, his consciousness spreading through the building&rsquo;s architecture like water through sand, ready to be absorbed along with everything else.</p>

<p>The other Involved officers had gone to be with their people &mdash; scattered across the city, across the planet, across the doomed system. <span class="thought">I stayed in the Centre, because someone had to watch, because someone had to count, because the Utilitaria needed a record even if no one would ever read it.</span></p>

<p>I peeled off the flesh-mask and the wig. There was no one left to hide from. The cool air found the hard lattice of my cranial inlays, the dense processing nodes that covered my skull like a second skin. I ran my hand over them once, feeling the faint warmth of their operation, and then I opened every channel I had left and broadcast a final status update to any relay that might still be listening.</p>

<p style="text-align:center; font-style:italic; color:var(--accent); margin:1.5em 0;">Evacuation complete. Seven point eight billion saved. System lost.</p>

<p>The Apathy reached the Centre twenty minutes and six seconds after emergence. I felt the building shudder as the machinery touched its outer hull, felt the warmth of the plasma curtains failing, the nervejam barriers going dead. The elongated saucer that had seemed so out of place among the grey towers was being taken apart, molecule by molecule, its exotic matter and its ordinary matter alike reduced to energy and consumed.</p>

<p>I had one last thought before the end, and it was this: <span class="thought">somewhere, through the interstice, seven point eight billion people were waking up in new bodies or new simulations, blinking in unfamiliar light, reaching for memories that were still warm from the transfer. They would mourn. They would rebuild. They would be found again, and they would run again, and some of them would die again. But not all of them. Never all of them.</span></p>

<p>The Apathy didn&rsquo;t care about any of that. They didn&rsquo;t care about anything. <span class="emphasis">That was the horror of it, and in a strange way, the comfort too. We weren&rsquo;t being punished. We weren&rsquo;t being judged. We were just in the way.</span></p>

<p>The Centre came apart around me, and I let it go.</p>`

  title: "RESTORATION",

  bg: "scene-bg-restoration",

  text: `<p>When they brought my most recent backup out of storage three days later, I was told the system had held for another eleven minutes after my biological death. The last few dataships had made it through the interstice before it was collapsed. <span class="emphasis">Final count: eight point one billion saved. Twenty point three percent.</span></p>

<p>They offered me an A-sphere posting in the next system down the line. I took it without hesitation. Somewhere out there, the Apathy was still coming, still consuming, still growing. Somewhere out there, someone was asking <span class="emphasis">how many can we save</span>, and someone else was doing the terrible arithmetic.</p>

<p><span class="emphasis">I had gotten good at that arithmetic. I intended to get better.</span></p>`

let currentScene = 0;
const container = document.getElementById('story-container');
const effectBar = document.getElementById('scene-effect');

function buildScenes() {
  SCENES.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'scene' + (i === 0 ? ' active' : '');
    div.id = 'scene-' + i;
    div.innerHTML = `
      <div class="scene-bg ${s.bg}"></div>
      <div class="scene-header">${s.header}</div>
      <div class="scene-title">${s.title}</div>
      <div class="scene-text">${s.text}</div>
      <div class="story-nav">
        <button onclick="goScene(${i-1})" ${i === 0 ? 'disabled' : ''}>← PREV</button>
        <select class="scene-select" onchange="goScene(parseInt(this.value))">
          ${SCENES.map((sc, j) => `<option value="${j}" ${j===i?'selected':''}>${j+1}. ${sc.title}</option>`).join('')}
        </select>
        <span class="scene-counter">${i+1} / ${SCENES.length}</span>
        <button onclick="goScene(${i+1})" ${i === SCENES.length-1 ? 'disabled' : ''}>NEXT →</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function goScene(i) {
  if (i < 0 || i >= SCENES.length) return;
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  document.getElementById('scene-' + i).classList.add('active');
  currentScene = i;

  // Update effect bar
  effectBar.className = 'scene-effect ' + (SCENES[i].effect || '');

  // Scroll to top of story
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Update all selects
  document.querySelectorAll('.scene-select').forEach(sel => sel.value = i);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goScene(currentScene + 1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goScene(currentScene - 1);
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) {
    if (dx < 0) goScene(currentScene + 1);
    else goScene(currentScene - 1);
  }
});

buildScenes();
</script>
</body>
</html>
