<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interstice Transit — First-Person Wormhole Passage</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
<style>
body { overflow: hidden; margin: 0; }
.canvas-full { position: fixed; inset: 0; z-index: 1; }
.canvas-full canvas { width: 100%; height: 100%; display: block; }
.overlay {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 80px 24px 24px;
}
.top-hud { font-family: var(--mono); font-size: 10px; color: var(--text-dim); line-height: 2; }
.top-hud .bright { color: var(--accent); }
.bottom-text {
  text-align: center; font-family: var(--mono); font-size: 11px;
  color: var(--text-mid); line-height: 1.8; max-width: 600px;
  margin: 0 auto; transition: opacity 0.5s;
}
.bottom-text .quote { font-style: italic; color: var(--text-dim); font-size: 10px; }
.controls {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  z-index: 3; display: flex; gap: 12px;
}
.ctrl-btn {
  background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
  color: var(--accent); font-family: var(--mono); font-size: 11px;
  padding: 8px 16px; cursor: pointer; letter-spacing: 2px; transition: all 0.2s;
  pointer-events: all;
}
.ctrl-btn:hover { background: rgba(0,229,255,0.1); }
</style>
</head>
<body>
<div class="canvas-full"><canvas id="cv"></canvas></div>
<div class="overlay">
  <div class="top-hud" id="hud"></div>
  <div class="bottom-text" id="narration"></div>
</div>
<div class="controls">
  <button class="ctrl-btn" onclick="restart()">RESTART</button>
</div>
<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const hudEl = document.getElementById('hud');
const narrEl = document.getElementById('narration');
let W, H, frame = 0, time = 0;

// From The Other Moon: "A dodecahedral cage, a Platonic solid which Seeker knew
// to be perfect and timeless: mathematics made material. And within the dodecahedron
// and the swirl of energy was distorted starlight, an alien sun."

const NARRATIONS = [
  { t: 0, text: 'The interstice fills half the sky. A roughly spherical swirl of enmeshed layers interpenetrating, flickering blue like the sparks from an engine igniter.<br><span class="quote">"It was surrounded by a dodecahedral cage, a Platonic solid &mdash; mathematics made material."</span>' },
  { t: 0.15, text: 'Tidal forces build. The radio clock updates grow longer. Time and space stretch.<br><span class="quote">"She keyed into the Other Moon\'s radio, and listened as the intervals between its clock updates grew longer, time and space stretching around her."</span>' },
  { t: 0.3, text: 'The blue-white gridwork of the cage races toward you. Starlight drains from the porthole.<br><span class="quote">"Ahead, the false sphere of stars within the interstice expanded, growing into her surroundings, like the image in a photograph flipping into reality."</span>' },
  { t: 0.5, text: 'Inside the cage. Radio signals disappear. Strange forces pull at your limbs. Shapes swirl. Vision fades.<br><span class="quote">"She merely observed the tugging and shifting forces applied to her limbs, as if she were diving deep beneath the ocean."</span>' },
  { t: 0.7, text: 'The world comes rushing in from every direction. Unfamiliar yellow-white sunlight. You are on the other side.<br><span class="quote">"All motion ceased and Seeker at last found herself adrift and weightless."</span>' },
  { t: 0.85, text: 'A band of stars &mdash; not the uniform haze, but a near-solid arc of translucent light. You are within another galaxy.<br><span class="quote">"The purpose of all this was to connect life to life. The Others had decided that something had to be done about this."</span>' },
];

function resize() {
  const r = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * r; cv.height = H * r;
  ctx.setTransform(r, 0, 0, r, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Stars - fixed positions
const stars = [];
for (let i = 0; i < 300; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = 0.1 + Math.random() * 0.9;
  stars.push({ a, r, b: 0.1 + Math.random() * 0.5, s: 0.5 + Math.random() * 1.5 });
}

function drawStars(distortion) {
  const cx = W / 2, cy = H / 2;
  const maxR = Math.max(W, H) * 0.7;

  stars.forEach(s => {
    // Stars get pulled toward center as we approach
    const pull = distortion * 0.8;
    const effectiveR = s.r * (1 - pull) * maxR;
    const angleShift = distortion * 0.3;
    const sx = cx + Math.cos(s.a + angleShift) * effectiveR;
    const sy = cy + Math.sin(s.a + angleShift) * effectiveR;

    // Stars blue-shift as speed increases
    const blueShift = Math.min(1, distortion * 2);
    const r2 = Math.round(255 * (1 - blueShift * 0.5));
    const g2 = Math.round(255 * (1 - blueShift * 0.3));
    const b2 = 255;

    // Stars streak radially
    const streakLen = distortion * 20;
    if (streakLen > 1) {
      const dx = sx - cx, dy = sy - cy;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + (dx / dist) * streakLen, sy + (dy / dist) * streakLen);
      ctx.strokeStyle = `rgba(${r2},${g2},${b2},${s.b * (1 - distortion * 0.5)})`;
      ctx.lineWidth = s.s * 0.5;
      ctx.stroke();
    } else {
      ctx.fillStyle = `rgba(${r2},${g2},${b2},${s.b})`;
      ctx.fillRect(sx, sy, s.s, s.s);
    }
  });
}

function drawDodecahedron(progress) {
  const cx = W / 2, cy = H / 2;

  // Cage appears and grows
  const cagePhase = Math.min(1, progress * 3);
  if (cagePhase <= 0) return;

  // Size grows as we approach, then encompasses us, then recedes
  let cageSize;
  if (progress < 0.4) {
    cageSize = 50 + progress * 800;
  } else if (progress < 0.6) {
    cageSize = 370 + (progress - 0.4) * 3000; // rushes past
  } else {
    cageSize = Math.max(20, 970 - (progress - 0.6) * 2000); // recedes behind
  }

  const alpha = progress < 0.5 ? Math.min(0.6, cagePhase * 0.6) : Math.max(0, 0.6 - (progress - 0.5) * 1.2);
  const rotation = frame * 0.003 + progress * 2;

  // Draw pentagonal faces of dodecahedron (projected 2D approximation)
  const numEdges = 20;
  for (let i = 0; i < numEdges; i++) {
    const a1 = (i / numEdges) * Math.PI * 2 + rotation;
    const a2 = ((i + 1) / numEdges) * Math.PI * 2 + rotation;
    const wobble = Math.sin(i * 2.4 + frame * 0.02) * 0.1;
    const r1 = cageSize * (0.8 + wobble);
    const r2 = cageSize * (0.85 + Math.sin(i * 1.7 + frame * 0.015) * 0.1);

    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a1) * r1, cy + Math.sin(a1) * r1 * 0.7);
    ctx.lineTo(cx + Math.cos(a2) * r2, cy + Math.sin(a2) * r2 * 0.7);
    ctx.strokeStyle = `rgba(120,140,255,${alpha * (0.5 + Math.sin(i + frame * 0.02) * 0.3)})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Cross-bracing
    if (i % 3 === 0) {
      const a3 = a1 + Math.PI * 0.6;
      const r3 = cageSize * 0.6;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a1) * r1, cy + Math.sin(a1) * r1 * 0.7);
      ctx.lineTo(cx + Math.cos(a3) * r3, cy + Math.sin(a3) * r3 * 0.7);
      ctx.strokeStyle = `rgba(100,120,255,${alpha * 0.2})`;
      ctx.stroke();
    }
  }

  // Inner swirl - "a roughly spherical swirl of enmeshed layers"
  if (progress < 0.65) {
    const swirlAlpha = alpha * 0.6;
    for (let i = 0; i < 5; i++) {
      const sa = frame * 0.008 * (i + 1) + i * 1.2;
      const sr = cageSize * 0.4 * (0.3 + i * 0.15);
      ctx.beginPath();
      ctx.arc(cx + Math.cos(sa) * sr * 0.3, cy + Math.sin(sa) * sr * 0.2,
              sr * 0.3, sa, sa + Math.PI * 1.5);
      ctx.strokeStyle = `rgba(140,160,255,${swirlAlpha * (0.3 + Math.sin(frame * 0.01 + i) * 0.15)})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  // Core glow
  const coreAlpha = progress < 0.3 ? progress * 0.5 : (progress < 0.6 ? 0.15 + (progress - 0.3) * 2 : Math.max(0, 0.75 - (progress - 0.6) * 2));
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, cageSize * 0.5);
  grd.addColorStop(0, `rgba(180,200,255,${coreAlpha * 0.3})`);
  grd.addColorStop(0.5, `rgba(100,120,200,${coreAlpha * 0.1})`);
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(cx, cy, cageSize * 0.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawTidalEffects(progress) {
  if (progress < 0.35 || progress > 0.65) return;
  const intensity = Math.sin((progress - 0.35) / 0.3 * Math.PI);

  // Tidal distortion lines
  for (let i = 0; i < 8; i++) {
    const y = H * 0.1 + (i / 7) * H * 0.8;
    const offset = Math.sin(frame * 0.03 + i * 0.8) * intensity * 30;
    ctx.beginPath();
    ctx.moveTo(0, y + offset);
    ctx.bezierCurveTo(W * 0.3, y - offset * 1.5, W * 0.7, y + offset * 1.5, W, y + offset);
    ctx.strokeStyle = `rgba(100,120,255,${intensity * 0.04})`;
    ctx.stroke();
  }
}

function drawEmergence(progress) {
  if (progress < 0.65) return;
  const t = (progress - 0.65) / 0.35;
  const cx = W / 2, cy = H / 2;

  // New sun appearing - "unfamiliar yellow-white sunlight"
  const sunAlpha = Math.min(1, t * 2);
  const sunR = 20 + t * 40;
  const sunX = W * 0.6 + t * W * 0.1;
  const sunY = H * 0.35;

  const sunGrd = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunR * 3);
  sunGrd.addColorStop(0, `rgba(255,240,200,${sunAlpha * 0.4})`);
  sunGrd.addColorStop(0.3, `rgba(255,220,150,${sunAlpha * 0.15})`);
  sunGrd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = sunGrd;
  ctx.beginPath();
  ctx.arc(sunX, sunY, sunR * 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(sunX, sunY, sunR * 0.3, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,250,230,${sunAlpha * 0.8})`;
  ctx.fill();

  // Galaxy band - "a near-solid arc of translucent light"
  if (t > 0.5) {
    const bandAlpha = (t - 0.5) * 2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(-0.4);
    const bandGrd = ctx.createLinearGradient(-W, -30, W, 30);
    bandGrd.addColorStop(0, 'rgba(180,190,220,0)');
    bandGrd.addColorStop(0.3, `rgba(180,190,220,${bandAlpha * 0.06})`);
    bandGrd.addColorStop(0.5, `rgba(200,210,240,${bandAlpha * 0.1})`);
    bandGrd.addColorStop(0.7, `rgba(180,190,220,${bandAlpha * 0.06})`);
    bandGrd.addColorStop(1, 'rgba(180,190,220,0)');
    ctx.fillStyle = bandGrd;
    ctx.fillRect(-W, -60, W * 2, 120);
    ctx.restore();
  }
}

function updateHud() {
  const distAU = Math.max(0, (0.5 - time) * 4).toFixed(3);
  const tidalG = time < 0.35 ? '0.00' : time < 0.65 ? ((time - 0.35) * 10).toFixed(2) : '0.00';
  const clockDrift = time < 0.2 ? '1.000' : time < 0.6 ? (1 / (1 + (time - 0.2) * 5)).toFixed(3) : 'N/A';

  hudEl.innerHTML = `<span class="bright">INTERSTICE TRANSIT</span><br>` +
    `RANGE: ${distAU} AU<br>` +
    `TIDAL FORCE: ${tidalG} G<br>` +
    `CLOCK RATIO: ${clockDrift}`;

  // Narration
  let currentNarr = NARRATIONS[0];
  for (const n of NARRATIONS) {
    if (time >= n.t) currentNarr = n;
  }
  narrEl.innerHTML = currentNarr.text;
}

function draw() {
  frame++;
  time = Math.min(1, time + 0.0004);

  // Background
  const bgProgress = Math.min(1, time * 1.5);
  ctx.fillStyle = time > 0.65 ? '#050510' : `rgb(${Math.round(2 - bgProgress)},${Math.round(4 - bgProgress * 3)},${Math.round(8 - bgProgress * 5)})`;
  ctx.fillRect(0, 0, W, H);

  const distortion = time < 0.3 ? time * 2 : (time < 0.6 ? 0.6 + (time - 0.3) * 1.3 : Math.max(0, 1 - (time - 0.6) * 2.5));
  drawStars(distortion);
  drawDodecahedron(time);
  drawTidalEffects(time);
  drawEmergence(time);
  updateHud();

  requestAnimationFrame(draw);
}

function restart() { time = 0; frame = 0; }
draw();
</script>
<script src="nav.js"></script>
</body>
</html>
