<p>Returning to Earth always gave me a faint swell of what, upon rather a lot of reflection, I could only describe as patriotic pride. Odd, considering I&rsquo;d never called it my home, and had never considered myself a part of Arcan culture.</p>

<p>The eyes of my vessel snapped open, and I flexed its &mdash; my &mdash; fingers for a moment as identity asserts control over flesh and machinery. I breathed in, dialling down the sensory sensitivity a tad, and stepped towards the waiting boost frame. Out of one window, the cable of Escalera 1242 stretched away towards an earth shrouded by orbital structures and soaring statite towers.</p>

<p>&ldquo;I think it was telling the truth.&rdquo;</p>

// STORY ENGINE
// ═══════════════════════════════════════════════════════════════════════════════

let currentScene = 0;
const container = document.getElementById('story-container');
const effectBar = document.getElementById('scene-effect');

function buildScenes() {
  SCENES.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'scene' + (i === 0 ? ' active' : '');
    div.id = 'scene-' + i;
    div.innerHTML = `
      <div class="scene-bg ${s.bg}"></div>
      <div class="scene-header">${s.header}</div>
      <div class="scene-title">${s.title}</div>
      <div class="scene-text">${s.text}</div>
      <div class="story-nav">
        <button onclick="goScene(${i-1})" ${i === 0 ? 'disabled' : ''}>← PREV</button>
        <select class="scene-select" onchange="goScene(parseInt(this.value))">
          ${SCENES.map((sc, j) => `<option value="${j}" ${j===i?'selected':''}>${j+1}. ${sc.title}</option>`).join('')}
        </select>
        <span class="scene-counter">${i+1} / ${SCENES.length}</span>
        <button onclick="goScene(${i+1})" ${i === SCENES.length-1 ? 'disabled' : ''}>NEXT →</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function goScene(i) {
  if (i < 0 || i >= SCENES.length) return;
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  document.getElementById('scene-' + i).classList.add('active');
  currentScene = i;

  // Update effect bar
  effectBar.className = 'scene-effect ' + (SCENES[i].effect || '');

  // Scroll to top of story
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Update all selects
  document.querySelectorAll('.scene-select').forEach(sel => sel.value = i);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goScene(currentScene + 1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goScene(currentScene - 1);
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) {
    if (dx < 0) goScene(currentScene + 1);
    else goScene(currentScene - 1);
  }
});

buildScenes();
</script>
